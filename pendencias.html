<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a12">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Pendências ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --pend: #ff3366;
  --prog: #ffb800;
  --done: #00e5a0;
  --accent: #7c4dff;
  --bg: #0a0a12;
  --bg2: #0f0f1c;
  --glass: rgba(255,255,255,0.04);
  --gb: rgba(255,255,255,0.08);
  --text: #f0efff;
  --text2: #6b6a8a;
  --r: 18px;
  --rsm: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  color: var(--text); display: flex; flex-direction: column;
}
.orb {
  position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
  filter: blur(80px); opacity: 0.18;
  animation: drift 20s ease-in-out infinite alternate;
}
.o1{width:400px;height:400px;background:var(--pend);top:-100px;left:-80px;animation-duration:18s}
.o2{width:350px;height:350px;background:var(--accent);bottom:-80px;right:-60px;animation-duration:22s;animation-delay:-8s}
.o3{width:280px;height:280px;background:var(--done);top:40%;left:40%;animation-duration:16s;animation-delay:-4s;opacity:.10}
@keyframes drift{0%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,30px) scale(0.95)}100%{transform:translate(10px,10px) scale(1.02)}}

header {
  position: relative; z-index: 20;
  padding: max(env(safe-area-inset-top),14px) 18px 14px;
  background: rgba(10,10,18,0.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--gb); flex-shrink: 0;
}
.h-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.logo {
  font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 2px; line-height: 1;
  background: linear-gradient(110deg,#ff3366 0%,#ffb800 45%,#00e5a0 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.logo-sub { font-size: 10px; color: var(--text2); letter-spacing: .15em; text-transform: uppercase; margin-top: 1px; }
.btn-new {
  display: flex; align-items: center; gap: 7px; padding: 10px 20px;
  background: var(--pend); border: none; border-radius: 99px;
  font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; font-weight: 600; color: #fff;
  cursor: pointer; box-shadow: 0 0 20px rgba(255,51,102,0.5); transition: transform .15s;
}
.btn-new:active { transform: scale(0.94); }
.search-box { position: relative; }
.search-box input {
  width: 100%; background: var(--glass); border: 1px solid var(--gb); border-radius: 99px;
  color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px; padding: 9px 14px 9px 38px; outline: none;
}
.search-box input::placeholder { color: var(--text2); }
.sico { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text2); pointer-events: none; }

#notif-bar {
  position: relative; z-index: 15; margin: 8px 16px 0; padding: 10px 14px;
  background: rgba(0,229,160,.08); border: 1px solid rgba(0,229,160,.25);
  border-radius: var(--rsm); font-size: 12px; color: var(--done);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
#notif-bar button { margin-left: auto; background: none; border: none; color: var(--done); font-size: 16px; cursor: pointer; }

.stats {
  display: flex; gap: 8px; padding: 10px 16px 0;
  flex-shrink: 0; position: relative; z-index: 10;
}
.sp {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 10px 8px; background: var(--glass); border: 1px solid var(--gb);
  border-radius: var(--rsm); cursor: pointer; position: relative; overflow: hidden;
  transition: background .15s, border-color .15s, transform .15s;
}
.sp::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; border-radius:2px 2px 0 0; }
.sp-pend::before { background:var(--pend); box-shadow:0 0 8px var(--pend); }
.sp-prog::before { background:var(--prog); box-shadow:0 0 8px var(--prog); }
.sp-done::before { background:var(--done); box-shadow:0 0 8px var(--done); }
.sp.active { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.07); transform: translateY(-2px); }
.snum { font-family:'Bebas Neue',sans-serif; font-size:26px; line-height:1; margin-bottom:2px; }
.sp-pend .snum { color:var(--pend); text-shadow:0 0 12px rgba(255,51,102,.6); }
.sp-prog .snum { color:var(--prog); text-shadow:0 0 12px rgba(255,184,0,.6); }
.sp-done .snum { color:var(--done); text-shadow:0 0 12px rgba(0,229,160,.6); }
.slbl { font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:.1em; color:var(--text2); }

.board { flex:1; overflow:hidden; position:relative; z-index:10; margin-top:10px; }
.col-panel { display:none; height:100%; overflow-y:auto; padding:14px 16px 100px; -webkit-overflow-scrolling:touch; }
.col-panel.active { display:block; }

.card {
  background: var(--glass); border: 1px solid var(--gb); border-radius: var(--r);
  padding: 16px; margin-bottom: 12px; position: relative; overflow: hidden;
  transition: transform .18s; animation: cIn .25s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes cIn { from{transform:translateY(16px) scale(.96);opacity:0} to{transform:translateY(0) scale(1);opacity:1} }
.card:active { transform: scale(0.97); }
.cglow { position:absolute; top:0; left:0; right:0; height:1.5px; }
.gp { background:linear-gradient(90deg,transparent,var(--pend),transparent); box-shadow:0 0 10px var(--pend); }
.gg { background:linear-gradient(90deg,transparent,var(--prog),transparent); box-shadow:0 0 10px var(--prog); }
.gd { background:linear-gradient(90deg,transparent,var(--done),transparent); box-shadow:0 0 10px var(--done); }
.cside { position:absolute; top:12px; left:0; width:3px; height:calc(100% - 24px); border-radius:0 3px 3px 0; }
.sp2 { background:var(--pend); box-shadow:0 0 8px var(--pend); }
.sg { background:var(--prog); box-shadow:0 0 8px var(--prog); }
.sd { background:var(--done); box-shadow:0 0 8px var(--done); }
.cbody { padding-left:10px; }
.ctxt { font-size:14px; line-height:1.5; color:var(--text); margin-bottom:10px; }
.ctags { display:flex; align-items:center; flex-wrap:wrap; gap:5px; margin-bottom:10px; }
.tag { font-size:10px; font-weight:600; padding:3px 9px; border-radius:99px; text-transform:uppercase; letter-spacing:.05em; }
.th { background:rgba(255,51,102,.15); color:var(--pend); border:1px solid rgba(255,51,102,.3); }
.tm { background:rgba(255,184,0,.15);  color:var(--prog); border:1px solid rgba(255,184,0,.3); }
.tl { background:rgba(0,229,160,.15);  color:var(--done); border:1px solid rgba(0,229,160,.3); }
.ta { background:rgba(124,77,255,.15); color:#b088ff;     border:1px solid rgba(124,77,255,.3); }
.cacts { display:flex; gap:6px; flex-wrap:wrap; }
.act {
  font-family:'Plus Jakarta Sans',sans-serif; font-size:11px; font-weight:600;
  padding:6px 13px; border-radius:99px; border:1px solid; cursor:pointer;
  background:transparent; display:flex; align-items:center; gap:5px; transition:background .12s, transform .1s;
}
.act:active { transform:scale(.93); }
.as { color:var(--prog); border-color:rgba(255,184,0,.35); }
.as:active { background:rgba(255,184,0,.1); }
.ad { color:var(--done); border-color:rgba(0,229,160,.35); }
.ad:active { background:rgba(0,229,160,.1); }
.ab { color:var(--text2); border-color:rgba(255,255,255,.12); }
.ab:active { background:rgba(255,255,255,.05); }
.al { color:#b088ff; border-color:rgba(124,77,255,.3); }
.al:active { background:rgba(124,77,255,.1); }
.ax { color:var(--pend); border-color:rgba(255,51,102,.25); }
.ax:active { background:rgba(255,51,102,.1); }
.empty-col { display:flex; flex-direction:column; align-items:center; padding:4rem 2rem; text-align:center; gap:10px; }
.eico { font-size:44px; opacity:.3; }
.etxt { font-size:13px; color:var(--text2); }

.fab {
  position:fixed; bottom:calc(24px + env(safe-area-inset-bottom,0px)); right:20px; z-index:30;
  width:56px; height:56px; border-radius:50%; border:none;
  background:linear-gradient(135deg,var(--pend),var(--accent));
  color:white; font-size:26px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 24px rgba(255,51,102,.55), 0 6px 20px rgba(0,0,0,.4);
  transition:transform .15s;
}
.fab:active { transform:scale(0.9); }

.overlay {
  position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.75);
  display:flex; align-items:flex-end; justify-content:center;
  backdrop-filter:blur(8px); animation:fadeO .18s ease;
}
@keyframes fadeO { from{opacity:0} to{opacity:1} }
.sheet {
  width:100%; max-width:540px; background:#12121f;
  border:1px solid var(--gb); border-bottom:none; border-radius:24px 24px 0 0;
  padding:24px 20px calc(24px + env(safe-area-inset-bottom,0px));
  max-height:88vh; overflow-y:auto;
  animation:shUp .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes shUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.shandle { width:36px; height:4px; border-radius:2px; background:rgba(255,255,255,.15); margin:0 auto 20px; }
.sheet h3 {
  font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:1.5px; margin-bottom:18px;
  background:linear-gradient(90deg,var(--pend),var(--prog));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.flbl { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.12em; color:var(--text2); margin-bottom:6px; margin-top:14px; display:block; }
.sheet textarea, .sheet input[type="datetime-local"] {
  width:100%; background:rgba(255,255,255,.05); border:1px solid var(--gb);
  border-radius:var(--rsm); color:var(--text); font-family:'Plus Jakarta Sans',sans-serif;
  font-size:14px; padding:12px 14px; outline:none; transition:border-color .18s;
}
.sheet textarea { min-height:90px; resize:none; }
.sheet textarea:focus, .sheet input:focus { border-color:rgba(124,77,255,.5); background:rgba(124,77,255,.06); }
.sheet input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter:invert(.7); cursor:pointer; }
.prio-picker { display:flex; gap:8px; }
.popt {
  flex:1; padding:10px 8px; border-radius:var(--rsm); border:1.5px solid var(--gb);
  background:transparent; cursor:pointer; text-align:center; font-size:11px; font-weight:600;
  color:var(--text2); letter-spacing:.05em; transition:all .15s;
}
.sel-high { border-color:var(--pend); background:rgba(255,51,102,.12); color:var(--pend); }
.sel-med  { border-color:var(--prog); background:rgba(255,184,0,.12);  color:var(--prog); }
.sel-low  { border-color:var(--done); background:rgba(0,229,160,.12);  color:var(--done); }
.sbtns { display:flex; gap:10px; margin-top:20px; }
.scancel {
  flex:1; padding:13px; border-radius:99px; border:1px solid var(--gb);
  background:transparent; color:var(--text2); font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; cursor:pointer;
}
.sok {
  flex:2; padding:13px; border-radius:99px; border:none;
  background:linear-gradient(135deg,var(--pend) 0%,var(--accent) 100%);
  color:white; font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; font-weight:700; cursor:pointer;
  box-shadow:0 4px 20px rgba(255,51,102,.4);
}
.sok:active { opacity:.85; }

.alarm-ring {
  width:100%; max-width:380px; margin:auto 20px; background:#120a00;
  border:2px solid var(--prog); border-radius:24px;
  padding:32px 24px calc(32px + env(safe-area-inset-bottom,0px));
  text-align:center; box-shadow:0 0 60px rgba(255,184,0,.3);
  animation:rPop .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes rPop { 0%{transform:scale(.4) rotate(-8deg);opacity:0} 100%{transform:scale(1) rotate(0);opacity:1} }
.rbell { font-size:64px; display:block; margin-bottom:14px; animation:bShake .4s ease infinite alternate; }
@keyframes bShake { 0%{transform:rotate(-18deg) scale(1)} 100%{transform:rotate(18deg) scale(1.08)} }
.alarm-ring h3 { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:2px; color:var(--prog); margin-bottom:8px; }
.alarm-ring p { font-size:14px; color:rgba(255,184,0,.65); line-height:1.5; margin-bottom:22px; }

#toast {
  position:fixed; bottom:calc(90px + env(safe-area-inset-bottom,0px));
  left:50%; transform:translateX(-50%); z-index:200;
  padding:11px 22px; background:rgba(18,18,31,.95); border:1px solid var(--gb);
  border-radius:99px; font-size:13px; font-weight:500; color:var(--text);
  display:flex; align-items:center; gap:8px; box-shadow:0 8px 32px rgba(0,0,0,.5);
  white-space:nowrap; animation:tPop .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes tPop { from{transform:translateX(-50%) scale(.85) translateY(10px);opacity:0} to{transform:translateX(-50%) scale(1) translateY(0);opacity:1} }
.tdot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
</style>
</head>
<body>
<div class="orb o1"></div>
<div class="orb o2"></div>
<div class="orb o3"></div>

<header>
  <div class="h-top">
    <div>
      <div class="logo">⚡ Pendências</div>
      <div class="logo-sub">Gestor de tarefas</div>
    </div>
    <button class="btn-new" onclick="openAdd()">+ NOVA TAREFA</button>
  </div>
  <div class="search-box">
    <span class="sico">🔍</span>
    <input type="text" id="search" placeholder="Buscar tarefa..." oninput="render()">
  </div>
</header>

<div id="notif-bar" style="display:none">
  🔔 <span id="ntxt"></span>
  <button onclick="this.parentElement.style.display='none'">✕</button>
</div>

<div class="stats">
  <div class="sp sp-pend active" data-col="pend" onclick="switchTab('pend')">
    <div class="snum" id="sn-pend">0</div><div class="slbl">Pendente</div>
  </div>
  <div class="sp sp-prog" data-col="prog" onclick="switchTab('prog')">
    <div class="snum" id="sn-prog">0</div><div class="slbl">Andamento</div>
  </div>
  <div class="sp sp-done" data-col="done" onclick="switchTab('done')">
    <div class="snum" id="sn-done">0</div><div class="slbl">Concluído</div>
  </div>
</div>

<div class="board">
  <div class="col-panel active" id="panel-pend"></div>
  <div class="col-panel" id="panel-prog"></div>
  <div class="col-panel" id="panel-done"></div>
</div>

<button class="fab" onclick="openAdd()" aria-label="Nova tarefa">+</button>

<!-- MODAL ADICIONAR -->
<div id="modal-add" style="display:none" class="overlay" onclick="if(event.target===this)closeAdd()">
  <div class="sheet">
    <div class="shandle"></div>
    <h3>NOVA TAREFA</h3>
    <span class="flbl">Descrição</span>
    <textarea id="inp-task" placeholder="Descreva a tarefa..."></textarea>
    <span class="flbl">Prioridade</span>
    <div class="prio-picker">
      <button class="popt sel-high" data-p="high" onclick="setPrio('high')">🔴 Alta</button>
      <button class="popt" data-p="med"  onclick="setPrio('med')">🟡 Média</button>
      <button class="popt" data-p="low"  onclick="setPrio('low')">🟢 Baixa</button>
    </div>
    <span class="flbl">⏰ Alarme — avisa no celular (opcional)</span>
    <input type="datetime-local" id="inp-alarm">
    <div class="sbtns">
      <button class="scancel" onclick="closeAdd()">Cancelar</button>
      <button class="sok" onclick="addTask()">Adicionar ⚡</button>
    </div>
  </div>
</div>

<!-- MODAL ALARME -->
<div id="modal-alarm" style="display:none" class="overlay" onclick="if(event.target===this)this.style.display='none'">
  <div class="sheet">
    <div class="shandle"></div>
    <h3>DEFINIR ALARME</h3>
    <span class="flbl">Data e hora do lembrete</span>
    <input type="datetime-local" id="alarm-dt">
    <p style="font-size:12px;color:var(--text2);margin-top:10px;line-height:1.6">
      Permita as notificações quando o app pedir. O alerta aparece no Android mesmo com tela bloqueada.
    </p>
    <div class="sbtns">
      <button class="scancel" onclick="document.getElementById('modal-alarm').style.display='none'">Cancelar</button>
      <button class="sok" onclick="saveAlarm()">Salvar alarme ⏰</button>
    </div>
  </div>
</div>

<!-- ALARM RING -->
<div id="modal-ring" style="display:none" class="overlay">
  <div class="alarm-ring">
    <span class="rbell">⏰</span>
    <h3>LEMBRETE!</h3>
    <p id="ring-txt"></p>
    <button class="sok" style="width:100%;flex:unset" onclick="dismissAlarm()">Dispensar</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast" style="display:none">
  <span class="tdot" id="tdot"></span>
  <span id="ttxt"></span>
</div>

<script>
const INITIAL = [
  "Situação do Vimerson","Grande Monta - imprimir e levar para o Everson","Contratação CTP/COA",
  "Devolução carros","Checklist dos carros próprios","Limpeza do telhado - Antigo frotas",
  "Instalação Alarcom, Terceiro e André","Multiplicar Fut em todas as frentes",
  "Como está a utilização do Piloto","Calular nos caminhões terceiro de Luiz Antônio e Nipoã",
  "Tempos Logístico","Teste de Fumaça","Devolução rastreadores - Alarcom","Atualização do BI",
  "GATEC, despacho de caminhões","Integração Axiagro x Gatec","Integração Solinftec x Gatec",
  "Valocidade dos caminhões","Verificação de pneu","Criação de cerca",
  "Acompanhar apresentação da diretoria","Fechamento do rv","Entrega das informações da Marilaura",
  "Fluxograma Euquiane","Dispensa Renivalda","Câmera coplasa","Podar árvore","Acesso ao sisma",
  "Instalação das câmeras, Nipoã e Luiz Antônio","Verificar Jumper","Acidente com a Van",
  "Rastreadores Transanti","Km da transanti","Plano de ação para as horas extras do adm",
  "Consumo de combustível","Lançamento das parada CEMMA E COPLASA","RNC estão usando?",
  "Pendências de Luiz Antônio","Pendências dois carros que foram pagos","Liberar uma linha para Moacir",
  "Teste mesa da prancha","Câmera da vinhaça, olhar fluxograma","Vassoura Magnética",
  "Escala do Peterson","Starlink"
];

let tasks=[], alarmTaskId=null, selectedPrio='high';

function load(){
  try{const s=localStorage.getItem('kb3');if(s){tasks=JSON.parse(s);return;}}catch(e){}
  tasks=INITIAL.map((t,i)=>({id:Date.now()+i,text:t.trim(),status:'pend',prio:'high',alarm:null}));
  save();
}
function save(){try{localStorage.setItem('kb3',JSON.stringify(tasks));}catch(e){}}

function render(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const cols={pend:[],prog:[],done:[]};
  tasks.forEach(t=>{if(!q||t.text.toLowerCase().includes(q))cols[t.status].push(t);});
  ['pend','prog','done'].forEach(s=>{
    document.getElementById('sn-'+s).textContent=cols[s].length;
    const el=document.getElementById('panel-'+s);
    if(!cols[s].length){
      const ico=s==='done'?'✅':s==='prog'?'⚡':'📋';
      const msg=s==='done'?'Nada concluído':s==='prog'?'Nada em andamento':'Sem pendências!';
      el.innerHTML=`<div class="empty-col"><div class="eico">${ico}</div><div class="etxt">${msg}</div></div>`;
      return;
    }
    el.innerHTML=cols[s].map(t=>cardHTML(t,s)).join('');
  });
}

function cardHTML(t,col){
  const pL={high:'Alta',med:'Média',low:'Baixa'};
  const pC={high:'th',med:'tm',low:'tl'};
  const gC={pend:'gp',prog:'gg',done:'gd'};
  const sC={pend:'sp2',prog:'sg',done:'sd'};
  const alarmTag=t.alarm?`<span class="tag ta">⏰ ${fmt(t.alarm)}</span>`:'';
  const prioTag=`<span class="tag ${pC[t.prio]||'tm'}">${pL[t.prio]||'Média'}</span>`;
  let btns='';
  if(col==='pend') btns=`<button class="act as" onclick="moveTo(${t.id},'prog')">▶ Iniciar</button>`;
  else if(col==='prog') btns=`<button class="act ad" onclick="moveTo(${t.id},'done')">✓ Concluir</button><button class="act ab" onclick="moveTo(${t.id},'pend')">◀ Voltar</button>`;
  else btns=`<button class="act ab" onclick="moveTo(${t.id},'pend')">↺ Reabrir</button>`;
  return `<div class="card">
    <div class="cglow ${gC[col]}"></div>
    <div class="cside ${sC[col]}"></div>
    <div class="cbody">
      <div class="ctxt">${esc(t.text)}</div>
      <div class="ctags">${prioTag}${alarmTag}</div>
      <div class="cacts">${btns}<button class="act al" onclick="openAlarm(${t.id})">⏰ Alarme</button><button class="act ax" onclick="del(${t.id})">✕</button></div>
    </div>
  </div>`;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(iso){
  const d=new Date(iso);
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

function switchTab(col){
  document.querySelectorAll('.sp').forEach(p=>p.classList.toggle('active',p.dataset.col===col));
  document.querySelectorAll('.col-panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+col));
}

function setPrio(p){
  selectedPrio=p;
  document.querySelectorAll('.popt').forEach(b=>{
    b.className='popt'+(b.dataset.p===p?' sel-'+p:'');
  });
}

function moveTo(id,status){
  const t=tasks.find(x=>x.id===id);
  if(t){t.status=status;save();render();switchTab(status);}
}
function del(id){
  tasks=tasks.filter(x=>x.id!==id);save();render();
  toast('Removida','#ff3366');
}

function openAdd(){
  selectedPrio='high';setPrio('high');
  document.getElementById('inp-task').value='';
  document.getElementById('inp-alarm').value='';
  document.getElementById('modal-add').style.display='flex';
  setTimeout(()=>document.getElementById('inp-task').focus(),300);
}
function closeAdd(){document.getElementById('modal-add').style.display='none';}

function addTask(){
  const text=document.getElementById('inp-task').value.trim();
  if(!text){document.getElementById('inp-task').focus();return;}
  const alarm=document.getElementById('inp-alarm').value||null;
  const t={id:Date.now(),text,status:'pend',prio:selectedPrio,alarm};
  tasks.unshift(t);save();render();closeAdd();
  if(alarm)scheduleAlarm(t);
  toast('Adicionada ⚡','#00e5a0');
  switchTab('pend');
}

function openAlarm(id){
  alarmTaskId=id;
  const t=tasks.find(x=>x.id===id);
  document.getElementById('alarm-dt').value=t.alarm?t.alarm.slice(0,16):'';
  document.getElementById('modal-alarm').style.display='flex';
}
function saveAlarm(){
  const val=document.getElementById('alarm-dt').value;
  const t=tasks.find(x=>x.id===alarmTaskId);
  if(t){t.alarm=val||null;save();render();if(val)scheduleAlarm(t);}
  document.getElementById('modal-alarm').style.display='none';
  if(val)toast('Alarme: '+fmt(val),'#ffb800');
}

function scheduleAlarm(task){
  if(!task.alarm)return;
  const delay=new Date(task.alarm)-Date.now();
  if(delay>0){
    setTimeout(()=>{
      const still=tasks.find(x=>x.id===task.id&&x.alarm===task.alarm);
      if(!still)return;
      fireAlarm(still);still.alarm=null;save();render();
    },delay);
  }
}

function fireAlarm(t){
  beep();
  document.getElementById('ring-txt').textContent=t.text;
  document.getElementById('modal-ring').style.display='flex';
  if(Notification.permission==='granted'){
    try{
      new Notification('⏰ Lembrete!',{
        body:t.text,requireInteraction:true,
        vibrate:[400,100,400,100,400],tag:'alarm-'+t.id
      });
    }catch(e){}
  }
}
function dismissAlarm(){document.getElementById('modal-ring').style.display='none';}

function beep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,250,500,750,1000].forEach((d,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=i%2===0?1046:784;o.type='sine';
      const t=ctx.currentTime+d/1000;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.45,t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      o.start(t);o.stop(t+0.35);
    });
  }catch(e){}
}

function checkAlarms(){
  const now=new Date();
  tasks.forEach(t=>{
    if(!t.alarm)return;
    const diff=now-new Date(t.alarm);
    if(diff>=0&&diff<60000){fireAlarm(t);t.alarm=null;save();render();}
  });
}

function reqNotif(){
  if(!('Notification' in window))return;
  if(Notification.permission==='granted'){showNotif('✅ Notificações ativas! Alarmes funcionam com app em segundo plano.');return;}
  if(Notification.permission!=='denied'){
    Notification.requestPermission().then(p=>{
      if(p==='granted')showNotif('✅ Perfeito! Alarmes vão aparecer mesmo com o celular bloqueado.');
      else showNotif('⚠️ Ative as notificações no Chrome para receber alertas.');
    });
  }
}
function showNotif(msg){
  document.getElementById('ntxt').textContent=msg;
  document.getElementById('notif-bar').style.display='flex';
  setTimeout(()=>document.getElementById('notif-bar').style.display='none',7000);
}

function toast(msg,color='#00e5a0'){
  document.getElementById('tdot').style.background=color;
  document.getElementById('ttxt').textContent=msg;
  const el=document.getElementById('toast');
  el.style.display='flex';clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.display='none',3000);
}

load();render();reqNotif();
setInterval(checkAlarms,20000);checkAlarms();
document.getElementById('inp-task').addEventListener('keydown',e=>{if(e.key==='Enter'&&e.ctrlKey)addTask();});
</script>
</body>
</html>
