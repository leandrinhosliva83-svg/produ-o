<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Consolidado — Velocidade</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4f0;
  --bg2:#ffffff;
  --bg3:#e8f0e8;
  --green:#1e7e34;
  --green-l:#4caf50;
  --green-dim:rgba(30,126,52,0.1);
  --blue:#1a3a8f;
  --blue-l:#2d5be3;
  --white:#ffffff;
  --dark:#1a2b1a;
  --gray:#5a7a5a;
  --border:rgba(30,126,52,0.2);
  --border-h:rgba(30,126,52,0.5);
  --orange:#e67e22;
  --red:#c0392b;
  --teal:#16a085;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Barlow',sans-serif;min-height:100vh;color:var(--dark);overflow-x:hidden;}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:3px solid var(--green);padding:0 12px;height:54px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(30,126,52,0.12);}
.logo-wrap{display:flex;align-items:center;gap:10px;}
.logo-img{height:32px;object-fit:contain;}
.logo-text{}
.logo-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dark);}
.logo-sub{font-size:8px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--green);}
.btn-refresh{display:flex;align-items:center;gap:4px;background:var(--green);border:none;color:#fff;padding:6px 10px;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:4px;transition:background .2s;}
.btn-refresh:hover{background:var(--green-l);}
.btn-refresh svg{transition:transform .3s;}
.btn-refresh.loading svg{animation:spin .8s linear infinite;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* STRIPE TOPO */
.top-stripe{height:4px;background:linear-gradient(90deg,var(--blue) 0%,var(--blue) 40%,var(--green) 40%,var(--green) 70%,var(--green-l) 70%,var(--green-l) 100%);}

.main{padding:12px;}

/* TÍTULO */
.page-header{background:#fff;border-radius:8px;padding:12px 14px;margin-bottom:12px;border-left:5px solid var(--green);box-shadow:0 1px 6px rgba(0,0,0,0.07);}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dark);}
.page-title span{color:var(--green);}
.page-sub{font-size:11px;color:var(--gray);letter-spacing:1px;margin-top:3px;}

/* ABAS */
.tabs{display:flex;gap:0;margin-bottom:16px;border-radius:6px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.tab-btn{flex:1;padding:9px 2px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;background:#fff;color:var(--gray);border-right:1px solid var(--border);transition:all .2s;font-family:'Barlow',sans-serif;}
.tab-btn:last-child{border-right:none;}
.tab-btn.ativo{background:var(--green);color:#fff;}
.tab-btn:hover:not(.ativo){background:var(--green-dim);}

/* DATAS */
.upd-bar{display:flex;gap:8px;margin-bottom:16px;}
.upd-box{flex:1;background:#fff;border-radius:6px;padding:6px 4px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06);border-top:3px solid var(--green);}
.upd-box-lbl{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:3px;}
.upd-box-val{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--green);}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.kpi{background:#1a2b1a;border-radius:8px;padding:10px 6px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,0.15);border:1px solid rgba(30,126,52,0.3);}
.kpi-ico{font-size:16px;margin-bottom:2px;}
.kpi-lbl{font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:2px;}
.kpi-val{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;}

/* PROPRIETÁRIO */
.prop-wrap{background:#1a2b1a;border-radius:8px;padding:10px 12px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,0.15);border:1px solid rgba(30,126,52,0.3);}
.prop-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:10px;}
.prop-btns{display:flex;flex-wrap:wrap;gap:7px;}

/* TABELA */
.tabela-wrap{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,0.07);}
.tabela{width:100%;border-collapse:collapse;font-size:12px;}
.tabela thead tr{background:var(--green);color:#fff;}
.tabela th{padding:8px 6px;text-align:left;font-size:8px;letter-spacing:1px;text-transform:uppercase;font-weight:700;white-space:nowrap;}
.tabela th.r{text-align:right;}
.tabela td{padding:8px 6px;border-bottom:1px solid var(--border);}
.tabela td.r{text-align:right;}
.tabela tbody tr:hover{background:var(--green-dim);}
.tabela tbody tr:last-child td{border-bottom:none;}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;}
.empty h3{font-family:'Barlow Condensed',sans-serif;font-size:20px;text-transform:uppercase;letter-spacing:2px;color:var(--green);margin-bottom:6px;}
.empty p{font-size:12px;color:var(--gray);}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;left:20px;background:var(--dark);border-left:4px solid var(--green);padding:12px 16px;font-size:12px;color:#fff;display:none;align-items:center;gap:8px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2);border-radius:6px;}
.toast.show{display:flex;}
.pbar{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--green),var(--green-l));display:none;z-index:9999;}
.pbar.on{display:block;}

/* VOLTAR LINK */
.back-link{font-size:11px;color:var(--green);cursor:pointer;text-decoration:underline;display:inline-block;margin-bottom:10px;}
</style>
</head>

    <button class="tab-btn"       id="tab-COPLASA" onclick="setEmp('COPLASA')">COPLASA</button>
    <button class="tab-btn"       id="tab-TODOS"   onclick="setEmp('TODOS')">TODOS</button>
  </div>

  <div class="upd-bar">
    <div class="upd-box"><div class="upd-box-lbl">CEM</div><div class="upd-box-val" id="upd-CEM">—</div></div>
    <div class="upd-box"><div class="upd-box-lbl">CEMMA</div><div class="upd-box-val" id="upd-CEMMA">—</div></div>
    <div class="upd-box"><div class="upd-box-lbl">COPLASA</div><div class="upd-box-val" id="upd-COPLASA">—</div></div>
  </div>

  <div class="kpis">
    <div class="kpi">
      <div class="kpi-ico">🚛</div>
      <div class="kpi-lbl">Caminhões</div>
      <div class="kpi-val" id="kpi-total" style="color:var(--blue);">—</div>
    </div>
    <div class="kpi">
      <div class="kpi-ico">📊</div>
      <div class="kpi-lbl">Média Velocidade</div>
      <div class="kpi-val" id="kpi-media" style="color:var(--red);">—</div>
    </div>
    <div class="kpi">
      <div class="kpi-ico">⚡</div>
      <div class="kpi-lbl">Total Eventos</div>
      <div class="kpi-val" id="kpi-eventos" style="color:var(--green);">—</div>
    </div>
  </div>

  <div class="prop-wrap">
    <div class="prop-lbl">👤 Filtrar por Proprietário</div>
    <div class="prop-btns" id="prop-btns"></div>
  </div>

  <div class="tabela-wrap">
    <div id="tabela-container">
      <div class="empty"><h3>Carregando...</h3><p>Buscando dados do servidor</p></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const UPSTASH_URL   = 'https://splendid-ray-99496.upstash.io';
const UPSTASH_TOKEN = 'gQAAAAAAAYSoAAIgcDI0Mjk3MjcwYTJiYWQ0ZDExYTE3YTMzMzc1MzBhMTZmNw';

async function kvGet(key) {
  try {
    var r = await fetch(UPSTASH_URL + '/get/' + encodeURIComponent(key), { headers: { 'Authorization': 'Bearer ' + UPSTASH_TOKEN } });
    var j = await r.json();
    if (j.result === null || j.result === undefined) return null;
    try { return JSON.parse(j.result); } catch(e) { return j.result; }
  } catch(e) { return null; }
}

var db = { CEM: [], CEMMA: [], COPLASA: [] };
var dbExcel = { CEM: [], CEMMA: [], COPLASA: [] };
var updatedAt = { CEM: null, CEMMA: null, COPLASA: null };
var empAtual = 'CEM';
var propSelecionado = null;

var _cores = ['#1e7e34','#1a3a8f','#e67e22','#16a085','#8e44ad','#c0392b','#2980b9','#27ae60','#d35400','#2c3e50','#7f8c8d','#f39c12'];
var _corMap = {};
function getCor(cod) {
  if (!_corMap[cod]) { var k = Object.keys(_corMap).length; _corMap[cod] = _cores[k % _cores.length]; }
  return _corMap[cod];
}

var _tt = null;
function showToast(ico, msg) {
  var el = document.getElementById('toast');
  el.innerHTML = '<span>' + ico + '</span><span>' + msg + '</span>';
  el.classList.add('show');
  if (_tt) clearTimeout(_tt);
  _tt = setTimeout(function(){ el.classList.remove('show'); }, 3000);
}

function fmtDate(iso) {
  if (!iso) return '—';
  try {
    var d = new Date(iso);
    return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  } catch(e) { return iso; }
}

async function carregar() {
  var btn = document.getElementById('btn-atualizar');
  var pbar = document.getElementById('pbar');
  if (btn) btn.classList.add('loading');
  if (pbar) pbar.classList.add('on');

  var keys = ['vel_CEM','vel_CEMMA','vel_COPLASA','CEM_dia','CEM_d1','CEMMA_dia','CEMMA_d1','COPLASA_dia','COPLASA_d1'];
  var results = await Promise.all(keys.map(function(k){ return kvGet(k); }));

  ['CEM','CEMMA','COPLASA'].forEach(function(emp, i) {
    var j = results[i];
    if (j && j.data && j.data.length) {
      db[emp] = j.data.filter(function(v){ return v.velocidade && v.velocidade > 0 && v.velocidade <= 250; });
      updatedAt[emp] = j.updatedAt || null;
    } else { db[emp] = []; updatedAt[emp] = null; }
    var el = document.getElementById('upd-' + emp);
    if (el) el.textContent = updatedAt[emp] ? fmtDate(updatedAt[emp]) : 'Sem dados';
  });

  ['CEM','CEMMA','COPLASA'].forEach(function(emp, i) {
    var dia = (results[3 + i*2] && results[3 + i*2].data) ? results[3 + i*2].data : [];
    var d1  = (results[4 + i*2] && results[4 + i*2].data) ? results[4 + i*2].data : [];
    var mapa = {};
    dia.concat(d1).forEach(function(r) {
      var tc = String(r.truckCode || '').trim();
      if (tc && !mapa[tc]) mapa[tc] = r;
    });
    dbExcel[emp] = Object.values(mapa);
  });

  if (btn) btn.classList.remove('loading');
  if (pbar) pbar.classList.remove('on');

  propSelecionado = null;
  renderBotoesProp();
  renderTabela();
  showToast('✅', 'Dados atualizados!');
}

function setEmp(emp) {
  empAtual = emp;
  propSelecionado = null;
  ['CEM','CEMMA','COPLASA','TODOS'].forEach(function(e) {
    var btn = document.getElementById('tab-' + e);
    if (btn) { if (e === emp) btn.classList.add('ativo'); else btn.classList.remove('ativo'); }
  });
  renderBotoesProp();
  renderTabela();
}

function getMapaCaminhao(emp) {
  var mapa = {};
  var emps = emp === 'TODOS' ? ['CEM','CEMMA','COPLASA'] : [emp];
  emps.forEach(function(e) {
    (dbExcel[e] || []).forEach(function(r) {
      var tc = String(r.truckCode || '').trim();
      if (tc) mapa[tc] = { owner: r.owner || '—', ownerCode: String(r.ownerCode || '').trim(), empresa: e };
    });
  });
  return mapa;
}

function getGrupos() {
  var emps = empAtual === 'TODOS' ? ['CEM','CEMMA','COPLASA'] : [empAtual];
  var mapa = getMapaCaminhao(empAtual);
  var grupos = {};
  emps.forEach(function(e) {
    (db[e] || []).forEach(function(r) {
      var tc = String(r.frota || r.codigo || '').trim();
      var info = mapa[tc];
      var ownerCode = info ? info.ownerCode : String(r.codigo || tc);
      var ownerNome = info ? info.owner     : (r.nome || tc);
      var empresa   = info ? info.empresa   : e;
      if (!grupos[ownerCode]) grupos[ownerCode] = { ownerCode: ownerCode, owner: ownerNome, empresa: empresa, caminhoes: [] };
      grupos[ownerCode].caminhoes.push({ truckCode: tc, velocidade: r.velocidade || 0, ocorrencias: r.ocorrencias || 0, empresa: e });
    });
  });

  var listaGrupos = Object.values(grupos);

  // Para CEM: filtrar só caminhões acima de 90 km/h
  if (empAtual === 'CEM') {
    listaGrupos = listaGrupos.map(function(g) {
      return Object.assign({}, g, {
        caminhoes: g.caminhoes.filter(function(c){ return c.velocidade > 90; })
      });
    }).filter(function(g){ return g.caminhoes.length > 0; });
  }

  return listaGrupos.sort(function(a,b) {
    var ma = a.caminhoes.reduce(function(s,c){return s+c.velocidade;},0) / (a.caminhoes.length||1);
    var mb = b.caminhoes.reduce(function(s,c){return s+c.velocidade;},0) / (b.caminhoes.length||1);
    return mb - ma;
  });
}

function renderBotoesProp() {
  var wrap = document.getElementById('prop-btns');
  if (!wrap) return;
  var grupos = getGrupos();
  if (!grupos.length) { wrap.innerHTML = '<span style="font-size:11px;color:var(--gray);">Sem dados carregados</span>'; return; }

  var html = '<button onclick="setProp(null)" style="padding:7px 14px;border-radius:20px;border:2px solid var(--green);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:\'Barlow\',sans-serif;transition:all .15s;'
    + (propSelecionado === null ? 'background:var(--green);color:#fff;' : 'background:transparent;color:var(--green);')
    + '">TODOS</button>';

  grupos.forEach(function(g) {
    var cor = getCor(g.ownerCode);
    var sel = propSelecionado === g.ownerCode;
    var nome = g.owner.length > 16 ? g.owner.substring(0,14) + '…' : g.owner;
    html += '<button onclick="setProp(\'' + g.ownerCode + '\')" style="padding:7px 14px;border-radius:20px;cursor:pointer;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:\'Barlow\',sans-serif;transition:all .15s;border:2px solid ' + cor + ';'
      + (sel ? 'background:' + cor + ';color:#fff;' : 'background:transparent;color:' + cor + ';')
      + '">' + nome + '</button>';
  });
  wrap.innerHTML = html;
}

function setProp(cod) {
  propSelecionado = (cod === propSelecionado) ? null : cod;
  renderBotoesProp();
  renderTabela();
}

function renderTabela() {
  var grupos = getGrupos();
  var mostrarEmp = empAtual === 'TODOS';
  if (propSelecionado) grupos = grupos.filter(function(g){ return g.ownerCode === propSelecionado; });

  var totalCam = grupos.reduce(function(s,g){ return s + g.caminhoes.length; }, 0);
  var totalEv  = grupos.reduce(function(s,g){ return s + g.caminhoes.reduce(function(ss,c){ return ss+c.ocorrencias; },0); }, 0);
  var todasVels = grupos.reduce(function(arr,g){ return arr.concat(g.caminhoes.map(function(c){return c.velocidade;})); }, []);
  var mediaGeral = todasVels.length > 0 ? (todasVels.reduce(function(s,v){return s+v;},0)/todasVels.length).toFixed(1) : '—';

  document.getElementById('kpi-total').textContent   = totalCam;
  document.getElementById('kpi-media').textContent   = mediaGeral !== '—' ? mediaGeral + ' km/h' : '—';
  document.getElementById('kpi-eventos').textContent = totalEv.toLocaleString('pt-BR');

  var sub = document.getElementById('page-sub');
  if (sub) sub.textContent = propSelecionado
    ? 'Detalhes do proprietário selecionado'
    : grupos.length + ' proprietário(s) · ' + totalCam + ' caminhão(ões)' + (empAtual === 'CEM' ? ' · acima de 90 km/h' : '');

  var el = document.getElementById('tabela-container');
  if (!el) return;

  if (!grupos.length) {
    el.innerHTML = '<div class="empty"><h3>Sem Dados</h3><p>Carregue o PDF de velocidade no ADM</p></div>';
    return;
  }

  var html = '';

  if (!propSelecionado) {
    html = '<table class="tabela"><thead><tr>'
      + (mostrarEmp ? '<th>EMP</th>' : '')
      + '<th>Proprietário</th>'
      + '<th class="r">CAM</th>'
      + '<th class="r">MÉDIA</th>'
      + '<th class="r">EVENTOS</th>'
      + '</tr></thead><tbody>';

    grupos.forEach(function(g, i) {
      var cor = getCor(g.ownerCode);
      var bg = i % 2 === 0 ? '#fff' : '#f7fbf7';
      var vels = g.caminhoes.map(function(c){ return c.velocidade; });
      var media = (vels.reduce(function(s,v){return s+v;},0)/vels.length).toFixed(1);
      var eventos = g.caminhoes.reduce(function(s,c){ return s+c.ocorrencias; },0);
      html += '<tr style="background:' + bg + ';cursor:pointer;" onclick="setProp(\'' + g.ownerCode + '\')">'
        + (mostrarEmp ? '<td style="font-size:9px;font-weight:700;color:var(--blue);white-space:nowrap;">' + g.empresa + '</td>' : '')
        + '<td style="max-width:110px;"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + cor + ';margin-right:5px;vertical-align:middle;flex-shrink:0;"></span>'
          + '<span style="font-size:11px;font-weight:600;color:var(--dark);">' + g.owner + '</span></td>'
        + '<td class="r" style="font-family:\'Barlow Condensed\',sans-serif;font-size:13px;font-weight:700;color:var(--blue);white-space:nowrap;">' + g.caminhoes.length + '</td>'
        + '<td class="r" style="white-space:nowrap;"><span style="font-family:\'Barlow Condensed\',sans-serif;font-size:13px;font-weight:700;color:var(--orange);">' + media + '</span><span style="font-size:9px;color:var(--gray);"> km/h</span></td>'
        + '<td class="r" style="font-family:\'Barlow Condensed\',sans-serif;font-size:13px;font-weight:700;color:var(--green);white-space:nowrap;">' + eventos.toLocaleString('pt-BR') + '</td>'
        + '</tr>';
    });
    html += '</tbody></table>';

  } else {
    var g = grupos[0];
    var caminhoes = g.caminhoes.slice().sort(function(a,b){ return b.velocidade - a.velocidade; });
    html = '<div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">'
      + '<div><span style="font-size:13px;font-weight:700;color:var(--dark);">' + g.owner + '</span>'
      + '<span style="font-size:10px;color:var(--gray);margin-left:8px;">' + caminhoes.length + ' caminhão(ões)</span></div>'
      + '<span class="back-link" onclick="setProp(null)">← Voltar</span>'
      + '</div>'
      + '<table class="tabela"><thead><tr>'
      + (mostrarEmp ? '<th>Empresa</th>' : '')
      + '<th>Caminhão</th><th class="r">Vel. Máx.</th><th class="r">Eventos</th>'
      + '</tr></thead><tbody>';

    caminhoes.forEach(function(c, i) {
      var bg = i % 2 === 0 ? '#fff' : '#f7fbf7';
      html += '<tr style="background:' + bg + ';">'
        + (mostrarEmp ? '<td style="font-size:10px;font-weight:700;color:var(--blue);">' + g.empresa + '</td>' : '')
        + '<td style="font-family:\'Barlow Condensed\',sans-serif;font-size:13px;font-weight:700;color:var(--dark);">🚛 ' + c.truckCode + '</td>'
        + '<td class="r"><span style="font-family:\'Barlow Condensed\',sans-serif;font-size:13px;font-weight:700;color:var(--red);">' + c.velocidade + ' km/h</span></td>'
        + '<td class="r" style="font-family:\'Barlow Condensed\',sans-serif;font-size:16px;color:var(--green);">' + c.ocorrencias.toLocaleString('pt-BR') + '</td>'
        + '</tr>';
    });
    html += '</tbody></table>';
  }

  el.innerHTML = html;
}

carregar();
</script>
</body>
</html>
